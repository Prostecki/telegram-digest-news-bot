name: Daily Digest

on:
  schedule:
    # 07:00 UTC — adjust to your timezone
    - cron: "0 7 * * *"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.DIGEST_GCP_WIF_PROVIDER }}
          service_account: ${{ vars.DIGEST_GCP_SERVICE_ACCOUNT }}

      - name: Load secrets from Secret Manager
        id: secrets
        uses: google-github-actions/get-secretmanager-secrets@v2
        with:
          export_to_environment: true
          secrets: |-
            TELEGRAM_BOT_TOKEN:athlete-ai-platform/digest-telegram-bot-token
            TELEGRAM_CHAT_ID:athlete-ai-platform/digest-telegram-chat-id

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest bot
        env:
          GCP_PROJECT_ID: ${{ vars.DIGEST_GCP_PROJECT_ID }}
          GCP_LOCATION: ${{ vars.DIGEST_GCP_LOCATION }}
          TTS_LANGUAGE: en-US
        run: python bot.py
