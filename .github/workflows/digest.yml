name: Daily Digest

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: digest-${{ github.ref }}
  cancel-in-progress: false

jobs:
  send-digest:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320517656418/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-digest-bot@athlete-ai-platform.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Load secrets from Secret Manager
        run: |
          echo "TELEGRAM_BOT_TOKEN=$(gcloud secrets versions access latest --secret=digest-telegram-bot-token --project=athlete-ai-platform)" >> "$GITHUB_ENV"
          echo "TELEGRAM_CHAT_ID=$(gcloud secrets versions access latest --secret=digest-telegram-chat-id --project=athlete-ai-platform)" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest bot
        env:
          GCP_PROJECT_ID: athlete-ai-platform
          GCP_LOCATION: us-central1
          TTS_LANGUAGE: en-US
        run: python bot.py
