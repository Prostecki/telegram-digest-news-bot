name: Deploy to Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "bot/**"
      - "digest/**"
      - "tts.py"
      - "requirements.txt"
      - "Dockerfile"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

env:
  PROJECT_ID: athlete-ai-platform
  REGION: us-central1
  SERVICE: digest-bot
  IMAGE: us-central1-docker.pkg.dev/athlete-ai-platform/digest-bot/app:${{ github.sha }}

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - run: pip install -r requirements-dev.txt
      - run: pytest -q

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (WIF)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/320517656418/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-digest-bot@athlete-ai-platform.iam.gserviceaccount.com

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Build image
        run: gcloud builds submit --tag "${IMAGE}" --project "${PROJECT_ID}"

      - name: Deploy new revision
        run: |
          gcloud run deploy "${SERVICE}" \
            --image "${IMAGE}" \
            --project "${PROJECT_ID}" \
            --region "${REGION}"
